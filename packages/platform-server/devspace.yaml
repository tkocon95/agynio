version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform

pipelines:
  dev: |-
    if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for platform-server..."
      kubectl patch application platform-server -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'platform-server' not found in argocd namespace."
    fi
    echo "Patching platform-server deployment for DevSpace..."
    kubectl patch deployment platform-server -n ${PLATFORM_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          containers:
            - name: platform-server
              image: ghcr.io/agynio/devcontainer-node:1
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/pnpm-workspace.yaml ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  exec /opt/app/data/packages/platform-server/scripts/devspace-startup.sh
              env:
                - name: NODE_ENV
                  value: development
                - name: GRAPH_REPO_PATH
                  value: /opt/app/data/graph
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"
    start_dev --disable-pod-replace platform-server

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:platform-server
    command: sh
    args:
      - -c
      - |
        if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
          echo "Re-enabling ArgoCD auto-sync for platform-server..."
          kubectl patch application platform-server -n argocd \
            --type merge \
            -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
          echo "ArgoCD auto-sync restored."
        fi

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: platform-server
      app.kubernetes.io/instance: platform-server
    containers:
      platform-server:
        container: platform-server
        sync:
          - path: ../..:/opt/app/data
            excludePaths:
              - .git/
              - node_modules/
              - dist/
              - .devspace/
              - .pnpm-store/
              - packages/platform-server/prisma/generated/
              - packages/platform-server/data/
              - "packages/**/src/proto/gen/"
            uploadExcludePaths:
              - .git/
              - node_modules/
              - dist/
              - .pnpm-store/
              - packages/platform-server/prisma/generated/
              - "packages/**/src/proto/gen/"
            downloadExcludePaths:
              - .git/
              - node_modules/
              - dist/
              - .pnpm-store/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3010"
