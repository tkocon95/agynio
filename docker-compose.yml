services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    user: root
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "0.0.0.0:5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "effective_cache_size=2GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agents_net

  agents-db:
    image: postgres:16-alpine
    container_name: agents-db
    restart: unless-stopped
    user: root
    environment:
      POSTGRES_USER: ${AGENTS_DB_USER:-agents}
      POSTGRES_PASSWORD: ${AGENTS_DB_PASSWORD:-agents}
      POSTGRES_DB: ${AGENTS_DB_NAME:-agents}
    ports:
      - "0.0.0.0:5443:5432"
    volumes:
      - agents_pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "effective_cache_size=2GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGENTS_DB_USER:-agents} -d ${AGENTS_DB_NAME:-agents}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agents_net

  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    user: root
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: change-me
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agents_net

  litellm:
    image: ghcr.io/berriai/litellm:v1.83.5-nightly
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command:
      - "--config=/app/config.yaml"
    container_name: litellm
    restart: unless-stopped
    user: root
    environment:
      LITELLM_MASTER_KEY: sk-dev-master-1234
      LITELLM_SALT_KEY: sk-dev-salt-1234
      DATABASE_URL: postgresql://litellm:change-me@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      UI_USERNAME: admin
      UI_PASSWORD: admin
      PORT: "4000"
      HOST: "0.0.0.0"
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      - "0.0.0.0:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || true"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agents_net

  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    restart: unless-stopped
    user: root
    cap_add:
      - IPC_LOCK
    ports:
      - "0.0.0.0:8200:8200"
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_LOCAL_CONFIG: |
        ui = true
        disable_mlock = true
        listener "tcp" {
          address     = "0.0.0.0:8200"
          tls_disable = 1
        }
        storage "file" {
          path = "/vault/file"
        }
        api_addr     = "http://vault:8200"
        cluster_addr = "http://vault:8201"
    command: ["server"]
    volumes:
      - vault-file:/vault/file
    networks:
      - agents_net

  vault-auto-init:
    image: hashicorp/vault:1.17
    container_name: vault-auto-init
    user: root
    depends_on:
      - vault
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - vault-file:/vault/file
      - ./vault/auto-init.sh:/auto-init.sh:ro
    entrypoint: ["/bin/sh", "/auto-init.sh"]
    networks:
      - agents_net

  migrate:
    image: node:20-alpine
    container_name: migrate
    restart: "no"
    user: root
    environment:
      AGENTS_DATABASE_URL: postgresql://agents:agents@agents-db:5432/agents
    volumes:
      - ./packages/platform-server/prisma:/prisma
    command: >
      sh -c "npm install -g prisma@6.18.0 --quiet 2>/dev/null &&
             prisma migrate deploy --schema /prisma/schema.prisma"
    depends_on:
      agents-db:
        condition: service_healthy
    networks:
      - agents_net

  platform-server:
    image: ghcr.io/agynio/platform-server:latest
    container_name: platform-server
    restart: unless-stopped
    user: root
    environment:
      AGENTS_DATABASE_URL: postgresql://agents:agents@agents-db:5432/agents
      LLM_PROVIDER: litellm
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: sk-dev-master-1234
      DOCKER_RUNNER_SHARED_SECRET: "super-secret-hmac-key-change-me"
      DOCKER_RUNNER_OPTIONAL: "true"
      DOCKER_RUNNER_GRPC_HOST: docker-runner
      DOCKER_RUNNER_GRPC_PORT: 50051
      CORS_ORIGINS: "*"
    ports:
      - "0.0.0.0:3010:3010"
    depends_on:
      agents-db:
        condition: service_healthy
      litellm:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/ > /dev/null 2>&1; exit 0"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - agents_net

  platform-ui:
    image: ghcr.io/agynio/platform-ui:latest
    container_name: platform-ui
    restart: unless-stopped
    user: root
    environment:
      API_UPSTREAM: http://platform-server:3010
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      platform-server:
        condition: service_started
    networks:
      - agents_net

  registry-mirror:
    image: registry:2
    restart: unless-stopped
    user: root
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
    ports:
      - "5000:5000"
    networks:
      - agents_net

  docker-runner:
    image: ghcr.io/agynio/docker-runner:latest
    container_name: docker-runner
    user: root
    restart: unless-stopped
    environment:
      DOCKER_RUNNER_SHARED_SECRET: "super-secret-hmac-key-change-me"
      DOCKER_MIRROR_URL: http://registry-mirror:5000
    ports:
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agents_net

# Nix Content-Addressable Proxy Server (ncps)
  # Provides a nix binary cache proxy for workspace containers.
  # - No host ports exposed; reachable on agents_net as http://ncps:8501
  # - Persistent storage backed by the ncps-storage volume
  ncps-init:
    image: alpine:3.20
    user: root
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -m 0755 -p /storage/var && mkdir -m 0700 -p /storage/var/ncps && mkdir -m 0700 -p /storage/var/ncps/db",
      ]
    volumes:
      - ncps-storage:/storage
    restart: "no"
    networks:
      - agents_net

  ncps-migrate:
    image: kalbasit/ncps:latest
    depends_on:
      ncps-init:
        condition: service_completed_successfully
    # Run dbmate schema migrations. Note: 'dbmate up' is a one-time schema init per storage volume.
    command:
      ["/bin/dbmate", "--url=sqlite:/storage/var/ncps/db/db.sqlite", "up"]
    volumes:
      - ncps-storage:/storage
    restart: "no"
    networks:
      - agents_net

  ncps:
    image: kalbasit/ncps:latest
    user: root
    oom_score_adj: -900
    depends_on:
      ncps-migrate:
        condition: service_completed_successfully
    command:
      - /bin/ncps
      - serve
      - --server-addr=0.0.0.0:8501
      - --cache-hostname=ncps
      - --cache-data-path=/storage
      - --cache-database-url=sqlite:/storage/var/ncps/db/db.sqlite
      - --upstream-cache=https://cache.nixos.org
      - --upstream-public-key=cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    ports:
      - "8501:8501"
    volumes:
      - ncps-storage:/storage
    networks:
      - agents_net
    environment:
      - PROMETHEUS_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8501/nix-cache-info"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  vault-file:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/vault
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/postgres
  agents_pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/agents
  litellm_pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/litellm
  ncps-storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/ncps
networks:
  agents_net:
    name: agents_net
