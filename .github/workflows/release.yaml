name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  CHART_REGISTRY: oci://ghcr.io/agynio/charts

jobs:
  images:
    name: Build and publish container images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: platform-server
            image: ghcr.io/agynio/platform-server
            dockerfile: packages/platform-server/Dockerfile
            context: .
          - name: platform-ui
            image: ghcr.io/agynio/platform-ui
            dockerfile: packages/platform-ui/Dockerfile
            context: .
          - name: docker-runner
            image: ghcr.io/agynio/docker-runner
            dockerfile: packages/docker-runner/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ env.RELEASE_VERSION }}
            ${{ matrix.image }}:latest

  charts:
    name: Package and publish Helm charts
    runs-on: ubuntu-latest
    needs: images
    permissions:
      contents: read
      packages: write
    env:
      CHARTS: "charts/platform-server charts/docker-runner charts/platform-ui"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Build chart dependencies
        run: |
          set -euo pipefail
          for chart in $CHARTS; do
            helm dependency build "$chart"
          done

      - name: Lint charts
        run: |
          set -euo pipefail
          for chart in $CHARTS; do
            helm lint "$chart"
          done

      - name: Package charts
        run: |
          set -euo pipefail
          mkdir -p dist
          for chart in $CHARTS; do
            helm package "$chart" \
              --destination dist \
              --version "$RELEASE_VERSION" \
              --app-version "$RELEASE_VERSION"
          done

      - name: Push charts to GHCR
        run: |
          set -euo pipefail
          for chart in $CHARTS; do
            name="$(basename "$chart")"
            helm push "dist/${name}-${RELEASE_VERSION}.tgz" "$CHART_REGISTRY"
          done
